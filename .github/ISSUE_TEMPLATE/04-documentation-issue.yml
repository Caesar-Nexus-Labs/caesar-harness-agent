name: Documentation issue
description: Report unclear, stale, or missing Caesar Harness Agent documentation.
title: "docs: "
labels:
  - documentation
  - needs-triage
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      description: Link or path to the affected documentation.
      placeholder: README.md or docs/tool-support-matrix.md
    validations:
      required: true
  - type: dropdown
    id: issue-type
    attributes:
      label: Documentation issue type
      options:
        - Incorrect or stale information
        - Missing setup steps
        - Missing tool details
        - Broken link
        - Confusing explanation
        - Other
    validations:
      required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested fix
    validations:
      required: false
