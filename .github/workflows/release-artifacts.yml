name: Deploy Native Plugins to Release Branch

on:
  push:
    branches:
      - main # Chạy tự động mỗi khi có code mới vào main
  workflow_dispatch: # Cho phép trigger bằng tay từ giao diện GitHub

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install

      - name: Build Artifacts (Generate dist folder)
        run: pnpm build

      - name: Copy README to dist
        run: cp README.md dist/

      - name: Deploy to Release Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: release
          force_orphan: true
          commit_message: "chore: auto-deploy native plugins to release branch"
