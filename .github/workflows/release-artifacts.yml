name: Deploy Native Plugins to Release Branch

on:
  push:
    branches:
      - main # Chạy tự động mỗi khi có code mới vào main
  workflow_dispatch: # Cho phép trigger bằng tay từ giao diện GitHub

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install

      - name: Build JS Packages
        run: pnpm build

      - name: Build Agent Artifacts (Generate dist folder)
        run: node packages/cli/dist/index.js build

      - name: Prepare Release Branch Contents
        run: |
          mkdir -p deploy
          cp README.md deploy/
          # Copy only the marketplace and native configuration folders to the root of the release branch
          cp -r dist/claude-plugin/.claude-plugin deploy/
          cp -r dist/opencode/.opencode deploy/
          cp -r dist/kiro/.kiro deploy/
          cp -r dist/factory/.factory deploy/
          cp -r dist/copilot/.github deploy/
          cp -r dist/openhands/.agents deploy/
          cp -r dist/gemini/.gemini deploy/
          cp -r dist/cursor/.cursor deploy/
          cp -r dist/kilo/.kilocodemodes deploy/
          cp -r dist/roo/.roomodes deploy/

      - name: Deploy to Release Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: release
          force_orphan: true
          commit_message: "chore: auto-deploy native plugins to release branch"
